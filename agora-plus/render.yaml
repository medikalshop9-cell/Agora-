# Render deployment config — AGORA+
# Hosting per docs/tech_stack.md
# Deploy backend FastAPI server + PostgreSQL

services:
  - type: web
    name: agora-plus-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agora-plus-db
          property: connectionString
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false
      - key: STREAM_CHAT_API_KEY
        sync: false
      - key: STREAM_CHAT_API_SECRET
        sync: false

databases:
  - name: agora-plus-db
    plan: free
    databaseName: agora_plus
